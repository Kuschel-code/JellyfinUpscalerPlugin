name: Build Plugin (CI)

# Note: Auto-release on tag push was removed after v1.6.1.11 / v1.6.1.12 shipped
# corrupt ZIPs. CI packaged `./publish/*` unfiltered (including .pdb, .deps.json,
# test-coverage DLLs from `dotnet test`) and clobbered the hand-curated 6-file
# plugin ZIP via softprops/action-gh-release. Releases are now always cut
# manually: `gh release create vX.Y.Z release-stage-X.Y.Z.zip`, then
# `pwsh Scripts/verify-release.ps1` to SHA-round-trip-validate. Keeping CI here
# for build + test verification only.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build plugin
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: |
          if dotnet test --list-tests --configuration Release --no-build 2>/dev/null | grep -q "Test run"; then
            dotnet test --configuration Release --no-build --verbosity normal
          else
            echo "No test projects found, skipping tests"
          fi

      - name: Publish plugin
        run: dotnet publish --configuration Release --no-build --output ./publish
        
      - name: Create plugin archive
        run: |
          cd publish
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '<AssemblyVersion>\K[^<]+' ../JellyfinUpscalerPlugin.csproj | head -1)
          fi
          zip -r "../JellyfinUpscalerPlugin-v${VERSION}.zip" ./*
          cd ..
          echo "PLUGIN_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=JellyfinUpscalerPlugin-v${VERSION}.zip" >> $GITHUB_ENV
          
      - name: Calculate SHA-256 checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "${ARCHIVE_NAME}" | awk '{print $1}')
          echo "Calculated SHA-256: ${CHECKSUM}"
          echo "(CI-built ZIP is intentionally NOT published. See workflow header for rationale.)"
