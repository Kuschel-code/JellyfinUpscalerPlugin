name: Build and Release STABLE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Extract version from csproj
      id: version
      run: |
        VERSION=$(grep -oP '<AssemblyVersion>\K[^<]+' JellyfinUpscalerPlugin.csproj)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Plugin version: $VERSION"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Publish
      run: dotnet publish -c Release -o ./publish

    - name: Package Plugin
      run: |
        cd publish
        zip -r ../JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip ./*

    - name: Compute Checksum
      id: checksum
      run: |
        CHECKSUM=$(md5sum JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip | awk '{print $1}')
        echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
        echo "MD5 Checksum: $CHECKSUM"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}
        path: ./JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip
        body: |
          ## AI Upscaler Plugin v${{ steps.version.outputs.version }}

          **MD5 Checksum:** `${{ steps.checksum.outputs.checksum }}`

          See [CHANGELOG](https://github.com/Kuschel-code/JellyfinUpscalerPlugin/blob/main/meta.json) for details.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build CPU Docker image
        run: |
          docker build -f docker-ai-service/Dockerfile.cpu \
            -t jellyfin-upscaler-cpu:smoke-test \
            docker-ai-service/

      - name: Start container
        run: |
          docker run -d --name upscaler-smoke \
            -p 5099:5000 \
            jellyfin-upscaler-cpu:smoke-test
          echo "Waiting for service startup..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost:5099/health > /dev/null 2>&1; then
              echo "Service ready after $((i*2))s"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "ERROR: service did not start within 90s"
              docker logs upscaler-smoke
              exit 1
            fi
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          curl -sf http://localhost:5099/health | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d.get('status') in ('ok', 'degraded', 'starting'), f'Unexpected health status: {d}'
          print('Health check passed:', d['status'])
          "

      - name: Verify status endpoint
        run: |
          curl -sf http://localhost:5099/status | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'model_loaded' in d, f'Missing model_loaded in status: {d}'
          print('Status check passed, model_loaded:', d['model_loaded'])
          "

      - name: Cleanup container
        if: always()
        run: |
          docker stop upscaler-smoke 2>/dev/null || true
          docker rm upscaler-smoke 2>/dev/null || true
