name: Build (CI)

# Auto-release on tag push removed after v1.6.1.12 — this workflow was uploading
# `zip -r publish/*` (unfiltered, underscore-named, 13.9 MB with test leak-through)
# alongside the dash-named ZIP from build-and-release.yml, both clobbering the
# hand-curated plugin ZIP attached by `gh release create`. Now build/test only.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: 9.0.x

    - name: Verify version sync
      run: bash Scripts/verify-version-sync.sh

    - name: Read version from version.json
      id: version
      run: |
        VERSION=$(jq -r .version version.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Plugin version: $VERSION"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Publish
      run: dotnet publish -c Release -o ./publish

    - name: Package Plugin
      run: |
        cd publish
        zip -r ../JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip ./*

    - name: Compute Checksum
      id: checksum
      run: |
        CHECKSUM=$(sha256sum JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip | awk '{print $1}')
        echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
        echo "SHA-256 Checksum: $CHECKSUM"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}
        path: ./JellyfinUpscalerPlugin_v${{ steps.version.outputs.version }}.zip

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r docker-ai-service/requirements-test.txt

      - name: Run unit tests
        run: pytest docker-ai-service/tests/ -v --tb=short

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies (CPU)
        run: pip-audit -r docker-ai-service/requirements-cpu.txt

  docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build CPU Docker image
        run: |
          docker build -f docker-ai-service/Dockerfile.cpu \
            -t jellyfin-upscaler-cpu:smoke-test \
            docker-ai-service/

      - name: Start container
        run: |
          docker run -d --name upscaler-smoke \
            -p 5099:5000 \
            jellyfin-upscaler-cpu:smoke-test
          echo "Waiting for service startup..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost:5099/health > /dev/null 2>&1; then
              echo "Service ready after $((i*2))s"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "ERROR: service did not start within 90s"
              docker logs upscaler-smoke
              exit 1
            fi
            sleep 2
          done

      - name: Verify health endpoint
        run: |
          curl -sf http://localhost:5099/health | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert isinstance(d.get('status'), str), f'Unexpected health status: {d}'
          print('Health check passed:', d['status'])
          "

      - name: Verify status endpoint
        run: |
          curl -sf http://localhost:5099/status | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'current_model' in d or 'model_loaded' in d, f'Missing model field in status: {d}'
          print('Status check passed:', d.get('current_model', d.get('model_loaded')))
          "

      - name: Cleanup container
        if: always()
        run: |
          docker stop upscaler-smoke 2>/dev/null || true
          docker rm upscaler-smoke 2>/dev/null || true
