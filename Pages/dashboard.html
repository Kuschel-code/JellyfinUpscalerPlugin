<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AI Upscaler Dashboard</title>
</head>
<body>
    <div id="aiUpscalerDashboardPage" data-role="page" class="page type-interior pluginConfigurationPage"
        data-require="emby-button">

        <div data-role="content">
            <div class="content-primary">
                <div class="verticalSection" style="text-align: center; padding: 3em;">
                    <h2 class="sectionTitle">AI Upscaler Dashboard</h2>
                    <p>The dashboard has moved to the main plugin settings page.</p>
                    <button is="emby-button" type="button" class="raised button-submit"
                        onclick="Dashboard.navigate('configurationpage?name=AI%20Upscaler%20Plugin');">
                        <span>Open AI Upscaler Settings</span>
                    </button>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            (function() {
                // Auto-redirect after a short delay
                setTimeout(function() {
                    if (typeof Dashboard !== 'undefined') {
                        Dashboard.navigate('configurationpage?name=AI%20Upscaler%20Plugin');
                    }
                }, 2000);
            })();
        </script>
    </div>
</body>
</html>
